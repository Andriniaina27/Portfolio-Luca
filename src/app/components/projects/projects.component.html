<section class="section" id="projets" aria-label="Mes projets">
  <div class="container">
    <p class="section-subtitle" appReveal>Portfolio</p>
    <h2 class="section-title" appReveal>Mes Projets</h2>

    <div class="projects-grid">
      @for (project of projects; track project.title) {
        <article class="project-card" appReveal>
          <div class="project-image">
            <div class="project-image-placeholder" [ngClass]="project.imageClass" aria-hidden="true">
              <i [class]="project.icon"></i>
            </div>
          </div>
          <div class="project-body">
            <div class="project-meta">
              <span class="project-date">{{ project.date }}</span>
            </div>
            <h3 class="project-title">{{ project.title }}</h3>
            <p class="project-context">{{ project.context }}</p>
            <p class="project-description">{{ project.description }}</p>
            <div class="project-tags">
              @for (tag of project.tags; track tag) {
                <span class="tag">{{ tag }}</span>
              }
            </div>
            <div class="project-links">
              <a [href]="project.link" target="_blank" rel="noopener noreferrer" class="project-link">
                <i class="fab fa-github" aria-hidden="true"></i> Voir le projet
              </a>
            </div>
          </div>
        </article>
      }
    </div>
  </div>
</section>
